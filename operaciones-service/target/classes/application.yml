server:
  port: 8082

spring:
  application:
    name: operaciones-service
  datasource:
    url: jdbc:mysql://mysql-operaciones:3306/operaciones_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

vehiculos:
  service:
    url: http://vehiculos-service
